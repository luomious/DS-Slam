<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DS-SLAM Visualizer</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111827;
      color: #f9fafb;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #374151;
    }
    main {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1px;
      height: calc(100vh - 55px);
      background: #374151;
    }
    section {
      min-width: 0;
      background: #0f172a;
      padding: 12px;
    }
    h1, h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }
    h2 {
      color: #cbd5e1;
    }
    .status {
      color: #93c5fd;
      font-size: 14px;
    }
    @media (max-width: 760px) {
      main {
        grid-template-columns: 1fr;
        height: auto;
        min-height: calc(100vh - 55px);
      }
      section {
        min-height: 220px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>DS-SLAM Visualizer</h1>
    <span id="status" class="status">connecting</span>
  </header>
  <main>
    <section><h2>RGB + Features</h2></section>
    <section><h2>Semantic Mask</h2></section>
    <section><h2>3D Map + Trajectory</h2></section>
    <section><h2>2D Grid Map</h2></section>
  </main>
  <script>
    fetch('/api/status')
      .then((response) => response.json())
      .then((data) => {
        document.getElementById('status').textContent =
          `${data.profile} | ${data.ws_path} | ${data.clients} clients`;
      })
      .catch(() => {
        document.getElementById('status').textContent = 'offline';
      });
  </script>
</body>
</html>
